name: verify

# Every example must run against the live Tenki API. A red build blocks the merge.
# Requires repo secret TENKI_API_KEY. Examples that depend on an npm package not yet
# published (e.g. tenki-eve-sandbox pre-publish) will fail their `npm install` step
# until that package is on npm — expected until first publish.

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    # Secrets (TENKI_API_KEY, and optional third-party keys) live in the `Test`
    # environment. Without this line the job reads only repo-level secrets and gets
    # an empty token, so every example fails auth. The environment has no protection
    # rules, so this doesn't gate the run.
    environment: Test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"   # Python examples (crewai) need 3.10+
      - name: Install + verify each example against Tenki
        env:
          TENKI_API_KEY: ${{ secrets.TENKI_API_KEY }}
          # Third-party keys some examples need. Unset → that example is skipped,
          # not failed (see .verify-requires below).
          COMPOSIO_API_KEY: ${{ secrets.COMPOSIO_API_KEY }}
        run: |
          # One example must not abort the rest (the runner shell is `bash -e`, so a
          # single failure would otherwise kill the whole job). We run every verify,
          # SKIP an example only when a key it declares in `.verify-requires` is unset,
          # and fail the job iff a *runnable* example fails. benchmarks/ obey the same
          # one rule as examples/ — a verify.mjs proving the Tenki-facing part.
          fails=""; skips=""
          for d in examples/*/ benchmarks/*/; do
            [ -f "${d}verify.mjs" ] || continue
            # Skip if any third-party key this example declares as required is unset.
            miss=""
            if [ -f "${d}.verify-requires" ]; then
              while IFS= read -r var || [ -n "$var" ]; do
                [ -z "$var" ] && continue
                [ -z "${!var}" ] && { miss="$var"; break; }
              done < "${d}.verify-requires"
            fi
            if [ -n "$miss" ]; then
              echo "== ${d} == SKIP (${miss} unset)"; skips="${skips} ${d}"; continue
            fi
            echo "== ${d} =="
            if ( cd "$d"
                 [ -f package.json ] && npm install --no-audit --no-fund
                 [ -f requirements.txt ] && python -m pip install -r requirements.txt
                 node verify.mjs ); then :; else fails="${fails} ${d}"; fi
          done
          echo; echo "skipped:${skips:- none}"; echo "failed:${fails:- none}"
          [ -z "$fails" ] || { echo "::error::runnable examples failed:${fails}"; exit 1; }
